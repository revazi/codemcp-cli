name: check

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync locked environment
        run: uv sync --frozen --all-groups

      - name: Check lockfile
        run: uv lock --check

      - name: Check formatting
        run: uv run ruff format --check src/codemcp_cli tests/python tests/fixtures

      - name: Lint
        run: uv run ruff check src/codemcp_cli tests/python tests/fixtures

      - name: Type-check
        run: |
          uv run mypy src/codemcp_cli tests/python/test_executor.py tests/python/test_settings.py tests/python/test_cli.py
          uv run ty check --project . src/codemcp_cli tests/python/test_executor.py tests/python/test_settings.py tests/python/test_cli.py

      - name: Test
        run: uv run pytest tests/python -q

      - name: Build distributions
        run: uv build
