name: check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUTF8: "1"
  UV_NO_PROGRESS: "1"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          cache-dependency-glob: uv.lock
          enable-cache: true
          python-version: "3.12"
          version: "0.11.29"

      - name: Verify lockfile
        run: uv lock --check

      - name: Sync quality environment
        run: uv sync --locked --no-default-groups --group lint --group test

      - name: Check formatting
        run: uv run --no-sync ruff format --check src/codemcp_cli tests/python tests/fixtures

      - name: Lint
        run: uv run --no-sync ruff check src/codemcp_cli tests/python tests/fixtures

      - name: Type-check with mypy
        run: >-
          uv run --no-sync mypy src/codemcp_cli
          tests/python/test_executor.py
          tests/python/test_settings.py
          tests/python/test_cli.py

      - name: Type-check with ty
        run: >-
          uv run --no-sync ty check --project . src/codemcp_cli
          tests/python/test_executor.py
          tests/python/test_settings.py
          tests/python/test_cli.py

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          cache-dependency-glob: uv.lock
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          version: "0.11.29"

      - name: Sync test environment
        run: uv sync --locked --no-default-groups --group test

      - name: Run tests with branch coverage
        run: >-
          uv run --no-sync pytest tests/python -q
          --cov=codemcp_cli
          --cov-branch
          --cov-report=term-missing
          --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  package:
    name: Package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          cache-dependency-glob: uv.lock
          enable-cache: true
          python-version: "3.12"
          version: "0.11.29"

      - name: Sync package environment
        run: uv sync --locked --no-default-groups --group package

      - name: Build wheel and source distribution
        run: uv build --out-dir dist

      - name: Validate distribution metadata
        run: uv run --no-sync twine check dist/*

      - name: Validate wheel contents
        run: uv run --no-sync check-wheel-contents dist/*.whl

      - name: Smoke-test installed wheel
        run: |
          uv venv --python 3.12 .package-venv
          uv pip install --python .package-venv/bin/python dist/*.whl
          .package-venv/bin/python -c \
            'import codemcp_cli; from codemcp_cli.api import create_runtime; print(codemcp_cli.__version__, create_runtime.__name__)'
          .package-venv/bin/codemcp-cli --help
          .package-venv/bin/python -m codemcp_cli --help
          test ! -e .package-venv/bin/codemcp

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: distributions
          path: dist/
          retention-days: 7
